    <ellipse cx="122" cy="64" rx="4.5" ry="4.5" fill="#222"/>
    <circle cx="124" cy="62" r="1.5" fill="white"/>

    <!-- Nose bridge line -->
    <path d="M136,58 C142,65 148,72 150,80" fill="none" stroke="#222" stroke-width="1.8"/>

