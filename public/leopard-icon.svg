    <path d="M8,130 C13,125 20,127 18,134 C16,141 9,139 7,133Z" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M35,130 C39,126 45,128 43,134 C41,140 36,138 34,133Z" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M15,150 C19,146 25,148 23,154 C21,160 16,158 14,153Z" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M50,120 C53,117 58,119 56,124 C54,129 51,127 49,123Z" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>

    <!-- Head shape - profile facing right -->
    <path d="M68,75 C72,60 82,48 98,42 C112,37 128,40 140,50 C152,60 156,78 150,92 C146,102 138,110 126,114 C114,118 100,116 88,110 C76,104 68,92 68,75Z" fill="#6CCF20" stroke="#222" stroke-width="2.2"/>

    <!-- Left ear -->
    <path d="M88,38 C86,25 92,16 102,20 C110,24 108,36 100,40Z" fill="#6CCF20" stroke="#222" stroke-width="2"/>
    <path d="M92,33 C91,27 94,22 99,24 C103,27 102,34 98,36Z" fill="#4AA510"/>

    <!-- Right ear -->
    <path d="M118,30 C120,17 128,12 135,18 C140,24 136,36 128,38Z" fill="#6CCF20" stroke="#222" stroke-width="2"/>
    <path d="M122,27 C123,21 127,17 132,21 C135,25 133,32 128,33Z" fill="#4AA510"/>

    <!-- Brow/forehead detail -->
