  <!-- Circle border (on top) -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#222" stroke-width="2.5"/>

  <!-- "REKLAM AJANSI" text curved at bottom -->
  <defs>
    <path id="bottomArc" d="M28,155 A82,82 0 0,0 172,155"/>
  </defs>
  <text font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="15.5" fill="#222" letter-spacing="2.5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">REKLAM AJANSI</textPath>
  </text>
</svg>
