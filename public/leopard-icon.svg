    <path d="M150,96 C148,100 144,102 140,102" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Chin -->
    <path d="M140,102 C134,108 126,112 118,114" fill="none" stroke="#222" stroke-width="1.5"/>

    <!-- Whiskers -->
    <line x1="162" y1="86" x2="185" y2="80" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="163" y1="90" x2="188" y2="88" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="162" y1="94" x2="186" y2="96" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Head spots -->
    <circle cx="100" cy="55" r="3" fill="#222" opacity="0.65"/>
    <circle cx="110" cy="50" r="2.5" fill="#222" opacity="0.65"/>
    <circle cx="130" cy="52" r="2.5" fill="#222" opacity="0.65"/>
    <circle cx="108" cy="68" r="3" fill="#222" opacity="0.6"/>
    <circle cx="96" cy="72" r="2.5" fill="#222" opacity="0.6"/>
    <circle cx="135" cy="70" r="2" fill="#222" opacity="0.6"/>
    <circle cx="115" cy="80" r="2.5" fill="#222" opacity="0.6"/>
    <circle cx="100" cy="85" r="2.5" fill="#222" opacity="0.55"/>
    <circle cx="128" cy="84" r="2" fill="#222" opacity="0.55"/>
    <circle cx="142" cy="72" r="2" fill="#222" opacity="0.6"/>
    <circle cx="88" cy="62" r="2" fill="#222" opacity="0.55"/>
    <circle cx="112" cy="95" r="2.5" fill="#222" opacity="0.55"/>
    <circle cx="125" cy="98" r="2" fill="#222" opacity="0.5"/>
    <circle cx="96" cy="98" r="2" fill="#222" opacity="0.5"/>
    <circle cx="82" cy="80" r="2.5" fill="#222" opacity="0.5"/>
    <circle cx="78" cy="95" r="2" fill="#222" opacity="0.45"/>
    <circle cx="140" cy="60" r="1.8" fill="#222" opacity="0.6"/>
