    <path d="M5,90 C10,84 19,87 17,95 C15,103 6,100 4,93Z" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M30,80 C35,75 42,78 40,85 C38,92 31,89 29,83Z" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
